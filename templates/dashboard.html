{% extends "base.html" %}
{% block title %}Dashboard — Gulmohar by Ankita{% endblock %}

{% block content %}

<div class="card" style="text-align:center;padding:0;overflow:hidden;">
    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Gulmohar by Ankita" style="width:100%;display:block;border-radius:8px;align-content: center;">
</div>

<div class="page-header">
    <h2>Dashboard</h2>
    <p class="page-desc">Welcome back! Here's your Boutique overview.</p>
</div>

<div class="stats-grid">
    <div class="stat-card stat-coral">
        <div class="stat-value">{{ total_products }}</div>
        <div class="stat-label">Total Products</div>
    </div>
    <div class="stat-card stat-gold">
        <div class="stat-value">{{ total_stock }}</div>
        <div class="stat-label">Items in Stock</div>
    </div>
    <div class="stat-card stat-blue">
        <div class="stat-value">{{ total_bills }}</div>
        <div class="stat-label">Total Bills</div>
    </div>
</div>

{% endblock %}
